<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>软件下载 - 让创作更简单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height:100vh;
  padding:40px 15px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.wrap{
  max-width:720px;
  margin:0 auto;
}
.header{
  text-align:center;
  color:#fff;
  margin-bottom:40px;
  animation: fadeInDown 0.8s ease;
}
.header h1{
  font-size:36px;
  font-weight:700;
  margin-bottom:12px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}
.header p{
  font-size:16px;
  opacity:0.9;
  letter-spacing:1px;
}
.down-card{
  background:#fff;
  border-radius:16px;
  padding:28px;
  margin:20px 0;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  animation: fadeInUp 0.6s ease;
  position:relative;
  overflow:hidden;
}
.down-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:4px;
  height:100%;
  background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
}
.down-card:hover{
  transform: translateY(-5px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.card-header{
  display:flex;
  align-items:center;
  margin-bottom:16px;
}
.software-icon{
  width:56px;
  height:56px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  margin-right:16px;
  flex-shrink:0;
}
.software-info h2{
  font-size:22px;
  color:#1a1a2e;
  margin-bottom:4px;
}
.version-tag{
  display:inline-block;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:#fff;
  padding:3px 12px;
  border-radius:20px;
  font-size:13px;
  font-weight:500;
}
.down-desc{
  color:#555;
  line-height:1.8;
  font-size:15px;
  margin:16px 0;
  padding-left:72px;
}
.down-desc strong{
  color:#333;
}
.file-info{
  display:flex;
  gap:20px;
  margin:12px 0;
  padding-left:72px;
  flex-wrap:wrap;
}
.file-info span{
  color:#888;
  font-size:13px;
}
.file-info span::before{
  content:'📦 ';
}
.down-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:#fff;
  padding:14px 36px;
  border-radius:30px;
  font-size:16px;
  font-weight:600;
  margin-top:16px;
  margin-left:72px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  border:none;
  cursor:pointer;
}
.down-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(102,126,234,0.5);
}
.down-btn::after{
  content:' ↓';
  font-size:18px;
}
.footer{
  text-align:center;
  color:rgba(255,255,255,0.7);
  margin-top:40px;
  font-size:14px;
  animation: fadeIn 1s ease 0.5s both;
}
.footer a{
  color:#fff;
  text-decoration:none;
  border-bottom:1px dashed rgba(255,255,255,0.5);
}
.loading{
  text-align:center;
  color:#fff;
  font-size:18px;
  padding:60px;
}
.loading::after{
  content:'';
  display:inline-block;
  width:20px;
  height:20px;
  border:2px solid #fff;
  border-top-color:transparent;
  border-radius:50%;
  margin-left:10px;
  animation: spin 1s linear infinite;
}
.error-msg{
  background:#fff;
  color:#e74c3c;
  padding:30px;
  border-radius:12px;
  text-align:center;
  font-size:16px;
}
@keyframes fadeInDown{
  from{opacity:0;transform:translateY(-30px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
@keyframes spin{
  to{transform:rotate(360deg)}
}
@media (max-width: 600px){
  .header h1{font-size:28px}
  .down-card{padding:20px}
  .down-desc,.file-info,.down-btn{margin-left:0;padding-left:0}
  .card-header{margin-bottom:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🚀 软件下载中心</h1>
    <p>精选实用工具，让创作更高效</p>
  </div>
  <div id="list"><div class="loading">正在加载软件列表</div></div>
  <div class="footer">
    <p>💡 如遇下载问题，请 <a href="#">联系我们</a> 获取帮助</p>
    <p style="margin-top:8px;opacity:0.6">Made with ❤️ for creators</p>
  </div>
</div>
<script>
fetch("soft.json")
.then(res=>res.json())
.then(arr=>{
  let html=""
  arr.forEach((item,index)=>{
    const icons = ['🎬','✂️']
    const icon = icons[index] || '📦'
    html += `
    <div class="down-card" style="animation-delay:${index*0.15}s">
      <div class="card-header">
        <div class="software-icon">
          ${item.logo ? `<img src="${item.logo}" alt="${item.name}" style="width:100%;height:100%;object-fit:cover;border-radius:14px;">` : `<span style="font-size:28px;">${icon}</span>`}
        </div>
        <div class="software-info">
          <h2>${item.name}</h2>
          <span class="version-tag">${item.version}</span>
        </div>
      </div>
      <div class="down-desc">
        <strong>功能介绍：</strong>${item.updateLog}
      </div>
      <div class="file-info">
        <span>${item.filename}</span>
        ${item.fileSize ? `<span>大小：${item.fileSize}</span>` : ''}
        ${item.md5 ? `<span>MD5：${item.md5}</span>` : ''}
      </div>
      <a class="down-btn" href="${item.downloadUrl}" target="_blank">立即下载</a>
    </div>
    `
  })
  document.getElementById("list").innerHTML=html
})
.catch(err=>{
  document.getElementById("list").innerHTML = `
    <div class="error-msg">
      <p>😅 读取下载配置失败</p>
      <p style="font-size:14px;color:#999;margin-top:10px">请刷新页面重试</p>
    </div>
  `
})
</script>
</body>
</html>
